presets:
  default:
    markup: auto
    formats: [original]
    widths: [400, 800, 1200]
    fallback_width: 800
    fallback_format: original
    quality: 85
    format_quality:
      webp:
        3000: 50
        1920: 60
        1080: 80
      jpeg: 75
    image_options:
      png:
        compression: 9
  grid:
    widths: [960, 1080, 1536]
    fallback_width: 960
    formats: [webp, original]
    format_quality:
      webp:
        1536: 60
        960: 80
      jpeg: 75
    strip_metadata: true
    image_options:
      png:
        compression: 9
    sizes:
      lg: 50vw
    size: 100vw
  header:
    formats: [webp, original]
    widths: [480, 960, 1280, 1920, 3072, 3840]
    fallback_width: 960
    dimension_attributes: true
    size: 100vw
  card:
    formats: [webp, original]
    widths: [400, 800]
    fallback_width: 400
    sizes:
      xl: 25vw
      lg: 33vw
      md: 50vw
    size: 100vw
  container:
    formats: [webp, original]
    widths: [400, 800, 1200]
    fallback_width: 400
    dimension_attributes: true
    sizes:
      xl: 1140px
      lg: 960px
      md: 720px
    size: 100vw
  portrait:
    formats: [original]
    widths: [256, 512]
    fallback_width: 256
    size: 256px
  direct_portrait:
    markup: direct_url
    fallback_width: 256
  meta:
    markup: direct_url
    widths: [200, 400]
    formats: [original]
  direct:
    markup: direct_url

media_queries: 
  sm: 'min-width: 576px'
  md: 'min-width: 768px'
  lg: 'min-width: 992px'
  xl: 'min-width: 1200px'